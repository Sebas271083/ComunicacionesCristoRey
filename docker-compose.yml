services:

  postgres:
    image: postgres:16-alpine
    container_name: educhat_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: educhat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: educativa_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educhat"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: educhat_backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "3001:3001"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: educhat_frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: